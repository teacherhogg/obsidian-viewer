services:

  watcher:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    restart: always
    volumes:
      # ── Pair 1 ──────────────────────────────────────────────────────────────
      - ${PAIR_1_INPUT}:/inputs/1:ro
      - ${PAIR_1_OUTPUT}:/outputs/1
      # ── Pair 2 ──────────────────────────────────────────────────────────────
      - ${PAIR_2_INPUT}:/inputs/2:ro
      - ${PAIR_2_OUTPUT}:/outputs/2
      # ── Pair 3 ──────────────────────────────────────────────────────────────
      - ${PAIR_3_INPUT}:/inputs/3:ro
      - ${PAIR_3_OUTPUT}:/outputs/3

  miraview-server:
    build:
      context: ./miraview-server
      dockerfile: Dockerfile
    env_file: .env
    restart: always
    volumes:
      - miraview-data:/data

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    env_file: .env
    restart: always
    volumes:
      # ── Pair 1 ──────────────────────────────────────────────────────────────
      - ${PAIR_1_OUTPUT}:/sites/1:ro
      # ── Pair 2 ────────────────────────────────────────────────────────────
      - ${PAIR_2_OUTPUT}:/sites/2:ro
      # ── Pair 3 ────────────────────────────────────────────────────────────
      - ${PAIR_3_OUTPUT}:/sites/3:ro
    ports:
      # ── Pair 1 ──────────────────────────────────────────────────────────────
      - "${PAIR_1_PORT}:${PAIR_1_PORT}"
      # ── Pair 2 ────────────────────────────────────────────────────────────
      - "${PAIR_2_PORT}:${PAIR_2_PORT}"
      # ── Pair 3 ────────────────────────────────────────────────────────────
      - "${PAIR_3_PORT}:${PAIR_3_PORT}"
    depends_on:
      - watcher
      - miraview-server

volumes:
  miraview-data:
