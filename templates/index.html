<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{VAULT_NAME}}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sidebar-width: 280px;
      --bg: #1e1e2e;
      --bg-sidebar: #181825;
      --bg-hover: #313244;
      --bg-active: #45475a;
      --text: #cdd6f4;
      --text-muted: #7f849c;
      --text-heading: #cba6f7;
      --accent: #89b4fa;
      --border: #313244;
      --tag-bg: #313244;
      --tag-text: #89dceb;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    #sidebar {
      width: var(--sidebar-width);
      min-width: var(--sidebar-width);
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 14px 16px;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }

    #sidebar-search {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
    }

    #sidebar-search input {
      width: 100%;
      background: var(--bg-active);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.8rem;
      padding: 5px 8px;
      outline: none;
    }

    #sidebar-search input::placeholder { color: var(--text-muted); }

    #sidebar-tree {
      overflow-y: auto;
      flex: 1;
      padding: 6px 0;
    }

    .tree-node { user-select: none; }

    .tree-item {
      display: flex;
      align-items: center;
      padding: 3px 8px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 0.83rem;
      gap: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
      text-decoration: none;
    }

    .tree-item:hover { background: var(--bg-hover); }

    .tree-icon { font-size: 0.9em; flex-shrink: 0; }
    .tree-label { overflow: hidden; text-overflow: ellipsis; flex: 1; }

    .tree-toggle {
      width: 14px;
      flex-shrink: 0;
      text-align: center;
      font-size: 0.7em;
      color: var(--text-muted);
      transition: transform 0.15s;
    }

    .tree-children { display: none; }
    .tree-children.open { display: block; }

    #main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      color: var(--text-muted);
    }

    #main h1 { font-size: 1.6rem; color: var(--text-heading); }
    #main p { font-size: 0.9rem; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--bg-active); border-radius: 3px; }
  </style>
</head>
<body>
  <nav id="sidebar">
    <div id="sidebar-header">{{VAULT_NAME}}</div>
    <div id="sidebar-search"><input type="text" id="search-input" placeholder="Search files…" autocomplete="off"></div>
    <div id="sidebar-tree">Loading…</div>
  </nav>

  <div id="main">
    <h1>{{VAULT_NAME}}</h1>
    <p>Select a note from the sidebar to begin reading.</p>
  </div>

  <script>
    const ROOT_PREFIX = '{{ROOT_PREFIX}}';

    async function loadNav() {
      try {
        const res = await fetch(ROOT_PREFIX + '_nav.json');
        if (!res.ok) throw new Error(res.status);
        return await res.json();
      } catch {
        return null;
      }
    }

    function buildTree(node, depth) {
      const div = document.createElement('div');
      div.className = 'tree-node';
      div.style.paddingLeft = (depth * 14) + 'px';

      if (node.type === 'dir' && depth > 0) {
        const item = document.createElement('div');
        item.className = 'tree-item dir-item';
        item.innerHTML = `<span class="tree-toggle">▶</span><span class="tree-icon">📁</span><span class="tree-label">${esc(node.name)}</span>`;

        const children = document.createElement('div');
        children.className = 'tree-children';

        if (node.children && node.children.length) {
          item.addEventListener('click', () => {
            const open = children.classList.toggle('open');
            item.querySelector('.tree-toggle').style.transform = open ? 'rotate(90deg)' : '';
          });
          for (const child of node.children) children.appendChild(buildTree(child, depth + 1));
        }

        div.appendChild(item);
        div.appendChild(children);

      } else if (node.type === 'file') {
        const a = document.createElement('a');
        a.href = ROOT_PREFIX + node.path;
        a.className = 'tree-item file-item';
        const label = node.name.replace(/\.html$/, '');
        a.innerHTML = `<span class="tree-icon">📄</span><span class="tree-label">${esc(label)}</span>`;
        div.appendChild(a);

      } else if (depth === 0) {
        for (const child of (node.children || [])) div.appendChild(buildTree(child, depth + 1));
      }

      return div;
    }

    function esc(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function filterTree(node, query) {
      if (!query) return node;
      if (node.type === 'file') return node.name.toLowerCase().includes(query) ? node : null;
      const filteredChildren = (node.children || []).map(c => filterTree(c, query)).filter(Boolean);
      return filteredChildren.length ? { ...node, children: filteredChildren } : null;
    }

    let navData = null;

    function renderTree(data, query) {
      const container = document.getElementById('sidebar-tree');
      if (!data) { container.textContent = 'Navigation unavailable'; return; }
      const filtered = query ? filterTree(data, query.toLowerCase()) : data;
      container.innerHTML = '';
      if (filtered) container.appendChild(buildTree(filtered, 0));
    }

    document.getElementById('search-input').addEventListener('input', e => {
      renderTree(navData, e.target.value.trim());
    });

    loadNav().then(data => { navData = data; renderTree(navData, ''); });
  </script>
</body>
</html>
