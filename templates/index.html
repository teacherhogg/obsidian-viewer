<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{VAULT_NAME}}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sidebar-width: 280px;
      --bg: #1e1e2e;
      --bg-sidebar: #181825;
      --bg-hover: #313244;
      --bg-active: #45475a;
      --text: #cdd6f4;
      --text-muted: #7f849c;
      --text-heading: #cba6f7;
      --accent: #89b4fa;
      --accent2: #a6e3a1;
      --border: #313244;
      --tag-bg: #313244;
      --tag-text: #89dceb;
    }

    html.light {
      --bg: #eff1f5;
      --bg-sidebar: #e6e9ef;
      --bg-hover: #ccd0da;
      --bg-active: #bcc0cc;
      --text: #4c4f69;
      --text-muted: #8c8fa1;
      --text-heading: #8839ef;
      --accent: #1e66f5;
      --accent2: #40a02b;
      --border: #ccd0da;
      --tag-bg: #ccd0da;
      --tag-text: #179299;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: var(--sidebar-width);
      min-width: var(--sidebar-width);
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
      transition: width 0.2s ease, min-width 0.2s ease;
    }

    #sidebar-header {
      padding: 12px 10px 12px 16px;
      display: flex;
      align-items: center;
      gap: 6px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #vault-name {
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .header-btns { display: flex; gap: 2px; flex-shrink: 0; }

    .icon-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 3px 6px;
      border-radius: 4px;
      font-size: 0.9rem;
      line-height: 1;
      display: flex;
      align-items: center;
    }
    .icon-btn:hover { background: var(--bg-hover); color: var(--text); }

    #sidebar-search {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #sidebar-search input {
      width: 100%;
      background: var(--bg-active);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.8rem;
      padding: 5px 8px;
      outline: none;
    }
    #sidebar-search input::placeholder { color: var(--text-muted); }

    #tree-controls {
      display: flex;
      gap: 4px;
      padding: 5px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #tree-controls button {
      flex: 1;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      cursor: pointer;
      padding: 3px 0;
      border-radius: 4px;
      font-size: 0.7rem;
    }
    #tree-controls button:hover { background: var(--bg-hover); color: var(--text); border-color: var(--text-muted); }

    #sidebar-tree {
      overflow-y: auto;
      flex: 1;
      padding: 6px 0;
    }

    .tree-node { user-select: none; }

    .tree-item {
      display: flex;
      align-items: center;
      padding: 3px 8px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 0.83rem;
      gap: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
      text-decoration: none;
    }

    .tree-item:hover { background: var(--bg-hover); }

    .tree-icon { font-size: 0.9em; flex-shrink: 0; }
    .tree-label { overflow: hidden; text-overflow: ellipsis; flex: 1; }

    .tree-toggle {
      width: 14px;
      flex-shrink: 0;
      text-align: center;
      font-size: 0.7em;
      color: var(--text-muted);
      transition: transform 0.15s;
    }

    .tree-children { display: none; }
    .tree-children.open { display: block; }

    .new-badge { color: var(--accent); font-size: 0.75em; flex-shrink: 0; margin-left: 2px; }
    .read-dot { color: var(--accent2); font-size: 0.72em; margin-left: 3px; flex-shrink: 0; }

    /* ── Filter bar ── */
    #nav-filter-bar {
      padding: 5px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #nav-filter-bar select {
      width: 100%;
      background: var(--bg-active);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font-size: 0.75rem;
      padding: 3px 6px;
      cursor: pointer;
      outline: none;
    }
    #nav-filter-bar select:focus { border-color: var(--accent); }

    /* ── Auth bar ── */
    #auth-bar {
      font-size: 0.82rem;
      color: var(--text-muted);
    }
    #auth-bar a { color: var(--accent); text-decoration: none; }
    #auth-bar a:hover { text-decoration: underline; }

    /* ── Sidebar resize handle ── */
    #sidebar-resize-handle {
      width: 5px;
      cursor: col-resize;
      flex-shrink: 0;
      background: transparent;
      transition: background 0.15s;
    }
    #sidebar-resize-handle:hover { background: var(--border); }
    #sidebar-resize-handle.resizing { background: var(--accent); }
    body.sidebar-collapsed #sidebar-resize-handle { display: none; }
    @media (max-width: 768px) { #sidebar-resize-handle { display: none; } }

    /* ── Desktop sidebar collapse ── */
    #sidebar-reopen-btn {
      display: none;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: 20px;
      z-index: 10;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: var(--bg-sidebar);
      border: none;
      border-right: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 1rem;
    }
    #sidebar-reopen-btn:hover { background: var(--bg-hover); color: var(--text); }

    @media (min-width: 769px) {
      body.sidebar-collapsed #sidebar { width: 0; min-width: 0; border-right: none; }
      body.sidebar-collapsed #sidebar-reopen-btn { display: flex; }
    }

    /* ── Mobile overlay ── */
    #mobile-toggle-btn { display: none; }

    #sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 150;
      background: rgba(0, 0, 0, 0.5);
    }

    @media (max-width: 768px) {
      #mobile-toggle-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        position: fixed;
        top: 10px;
        left: 10px;
        z-index: 100;
        background: var(--bg-sidebar);
        border: 1px solid var(--border);
        color: var(--text);
        width: 36px;
        height: 36px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 1.1rem;
      }

      #sidebar {
        position: fixed;
        left: 0; top: 0;
        height: 100%;
        z-index: 200;
        width: 100vw;
        min-width: 100vw;
        transform: translateX(-100%);
        transition: transform 0.25s ease;
      }

      body.sidebar-open #sidebar { transform: translateX(0); }
      body.sidebar-open #sidebar-overlay { display: block; }

      #main { padding-top: 56px; }
    }

    /* ── Main area ── */
    #main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      color: var(--text-muted);
    }

    #main h1 { font-size: 1.6rem; color: var(--text-heading); }
    #main p { font-size: 0.9rem; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--bg-active); border-radius: 3px; }
  </style>
</head>
<body>
  <div id="sidebar-overlay"></div>
  <button id="mobile-toggle-btn" aria-label="Open navigation">☰</button>
  <button id="sidebar-reopen-btn" aria-label="Expand sidebar">›</button>

  <nav id="sidebar">
    <div id="sidebar-header">
      <span id="vault-name">{{VAULT_NAME}}</span>
      <div class="header-btns">
        <button class="icon-btn" id="theme-toggle-btn" title="Toggle theme">☀</button>
        <button class="icon-btn" id="sidebar-close-btn" title="Collapse sidebar">‹</button>
      </div>
    </div>
    <div id="sidebar-search"><input type="text" id="search-input" placeholder="Search files…" autocomplete="off"></div>
    <div id="tree-controls">
      <button id="expand-all-btn" title="Expand all folders">Expand all</button>
      <button id="collapse-all-btn" title="Collapse all folders">Collapse all</button>
    </div>
    <div id="nav-filter-bar" style="display:none">
      <select id="nav-filter-select">
        <option value="all">All notes</option>
        <option value="read">Read</option>
        <option value="unread">Unread</option>
        <option value="most-read">Sort: Most read</option>
        <option value="least-read">Sort: Least read</option>
        <option value="recently-read">Sort: Recently read</option>
        <option value="least-recently-read">Sort: Least recently read</option>
      </select>
    </div>
    <div id="sidebar-tree">Loading…</div>
  </nav>

  <div id="sidebar-resize-handle"></div>

  <div id="main">
    <h1>{{VAULT_NAME}}</h1>
    <p>Select a note from the sidebar to begin reading.</p>
    <p id="auth-bar"></p>
  </div>

  <script>
    const ROOT_PREFIX = '{{ROOT_PREFIX}}';
    const VAULT_NAME = {{VAULT_NAME_JSON}};

    // ── Theme ──
    const themeBtn = document.getElementById('theme-toggle-btn');
    function applyTheme(dark) {
      document.documentElement.classList.toggle('light', !dark);
      themeBtn.textContent = dark ? '☀' : '🌙';
    }
    applyTheme(localStorage.getItem('theme') !== 'light');
    themeBtn.addEventListener('click', () => {
      const nowLight = document.documentElement.classList.toggle('light');
      themeBtn.textContent = nowLight ? '🌙' : '☀';
      localStorage.setItem('theme', nowLight ? 'light' : 'dark');
    });

    // ── Sidebar toggle ──
    function isMobile() { return window.innerWidth <= 768; }

    function openSidebar() {
      if (isMobile()) document.body.classList.add('sidebar-open');
      else document.body.classList.remove('sidebar-collapsed');
    }
    function closeSidebar() {
      if (isMobile()) {
        document.body.classList.remove('sidebar-open');
      } else {
        document.body.classList.add('sidebar-collapsed');
        localStorage.setItem('sidebarCollapsed', '1');
      }
    }

    document.getElementById('sidebar-close-btn').addEventListener('click', closeSidebar);
    document.getElementById('mobile-toggle-btn').addEventListener('click', openSidebar);
    document.getElementById('sidebar-overlay').addEventListener('click', closeSidebar);
    document.getElementById('sidebar-reopen-btn').addEventListener('click', openSidebar);

    if (!isMobile() && localStorage.getItem('sidebarCollapsed') === '1') {
      document.body.classList.add('sidebar-collapsed');
    }

    // ── Resizable sidebar ──
    const MIN_SIDEBAR_WIDTH = 160, MAX_SIDEBAR_WIDTH = 800;
    const sidebarEl = document.getElementById('sidebar');
    const resizeHandle = document.getElementById('sidebar-resize-handle');

    if (!isMobile()) {
      const savedW = parseInt(localStorage.getItem('sidebarWidth') || '280', 10);
      document.documentElement.style.setProperty('--sidebar-width', savedW + 'px');
    }

    resizeHandle.addEventListener('mousedown', e => {
      if (isMobile() || document.body.classList.contains('sidebar-collapsed')) return;
      e.preventDefault();
      sidebarEl.style.transition = 'none';
      resizeHandle.classList.add('resizing');
      const startX = e.clientX;
      const startW = sidebarEl.getBoundingClientRect().width;

      const onMove = e => {
        const w = Math.max(MIN_SIDEBAR_WIDTH, Math.min(MAX_SIDEBAR_WIDTH, startW + (e.clientX - startX)));
        document.documentElement.style.setProperty('--sidebar-width', w + 'px');
      };
      const onUp = () => {
        localStorage.setItem('sidebarWidth', Math.round(sidebarEl.getBoundingClientRect().width));
        sidebarEl.style.transition = '';
        resizeHandle.classList.remove('resizing');
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });

    // ── Expand / Collapse all ──
    document.getElementById('expand-all-btn').addEventListener('click', () => {
      document.querySelectorAll('.tree-children').forEach(el => el.classList.add('open'));
      document.querySelectorAll('.tree-toggle').forEach(el => el.style.transform = 'rotate(90deg)');
    });
    document.getElementById('collapse-all-btn').addEventListener('click', () => {
      document.querySelectorAll('.tree-children').forEach(el => el.classList.remove('open'));
      document.querySelectorAll('.tree-toggle').forEach(el => el.style.transform = '');
    });

    // ── Navigation ──
    async function loadNav() {
      try {
        const res = await fetch(ROOT_PREFIX + '_nav.json');
        if (!res.ok) throw new Error(res.status);
        return await res.json();
      } catch {
        return null;
      }
    }

    function buildTree(node, depth, forceOpen) {
      const div = document.createElement('div');
      div.className = 'tree-node';
      div.style.paddingLeft = (depth * 14) + 'px';

      if (node.type === 'dir' && depth > 0) {
        const item = document.createElement('div');
        item.className = 'tree-item dir-item';
        const dirBadge = node.isNew ? '<span class="new-badge" title="Contains new content">★</span>' : '';
        item.innerHTML = `<span class="tree-toggle">▶</span><span class="tree-icon">📁</span><span class="tree-label">${esc(node.name)}</span>${dirBadge}`;

        const children = document.createElement('div');
        children.className = 'tree-children';

        if (node.children && node.children.length) {
          item.addEventListener('click', () => {
            const open = children.classList.toggle('open');
            item.querySelector('.tree-toggle').style.transform = open ? 'rotate(90deg)' : '';
          });
          for (const child of node.children) children.appendChild(buildTree(child, depth + 1, forceOpen));
        }

        div.appendChild(item);
        div.appendChild(children);

        if (forceOpen) {
          children.classList.add('open');
          item.querySelector('.tree-toggle').style.transform = 'rotate(90deg)';
        }

      } else if (node.type === 'file') {
        const a = document.createElement('a');
        a.href = ROOT_PREFIX + node.path;
        a.className = 'tree-item file-item';
        const label = node.name.replace(/\.html$/, '');
        const fileBadge = node.isNew ? '<span class="new-badge" title="New content">★</span>' : '';
        a.innerHTML = `<span class="tree-icon">📄</span><span class="tree-label">${esc(label)}</span>${fileBadge}`;
        div.appendChild(a);

      } else if (depth === 0) {
        for (const child of (node.children || [])) div.appendChild(buildTree(child, depth + 1, forceOpen));
      }

      return div;
    }

    function esc(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function filterTree(node, query) {
      if (!query) return node;
      if (node.type === 'file') return node.name.toLowerCase().includes(query) ? node : null;
      const filteredChildren = (node.children || []).map(c => filterTree(c, query)).filter(Boolean);
      return filteredChildren.length ? { ...node, children: filteredChildren } : null;
    }

    let navData = null;
    let currentUser = null;
    let vaultReads = null;

    // ── Auth ──
    async function checkAuthStatus() {
      try {
        const res = await fetch('/auth/status');
        if (!res.ok) return;
        const data = await res.json();
        currentUser = data.loggedIn ? data.username : null;
      } catch { currentUser = null; }
      const authBar = document.getElementById('auth-bar');
      if (!currentUser) {
        authBar.innerHTML = '<a href="/login.html">Sign in</a> to track reading';
      } else {
        authBar.innerHTML = 'Signed in as <strong>' + esc(currentUser) + '</strong> · <a href="#" id="logout-link">Log out</a>';
        document.getElementById('logout-link').addEventListener('click', async (e) => {
          e.preventDefault();
          await fetch('/auth/logout', { method: 'POST' });
          currentUser = null;
          vaultReads = null;
          authBar.innerHTML = '<a href="/login.html">Sign in</a> to track reading';
          document.getElementById('nav-filter-bar').style.display = 'none';
          renderTree(navData, document.getElementById('search-input').value.trim());
        });
        document.getElementById('nav-filter-bar').style.display = '';
      }
    }

    // ── Vault-wide reads ──
    async function loadVaultReads() {
      if (!currentUser) return;
      try {
        const res = await fetch('/api/reads/vault?vault=' + encodeURIComponent(VAULT_NAME));
        if (!res.ok) return;
        const data = await res.json();
        vaultReads = {};
        for (const r of data.reads) vaultReads[r.docPath.replace(/\\/g, '/')] = r;
      } catch { vaultReads = null; }
    }

    function applyReadDotsToNav() {
      if (!vaultReads) return;
      document.querySelectorAll('.file-item').forEach(el => {
        const href = el.getAttribute('href') || '';
        const docPath = href.startsWith(ROOT_PREFIX)
          ? href.slice(ROOT_PREFIX.length)
          : href.replace(/^\//, '');
        if (vaultReads[docPath] && !el.querySelector('.read-dot')) {
          el.insertAdjacentHTML('beforeend', '<span class="read-dot" title="Read">✓</span>');
        }
      });
    }

    // ── Filter / Sort ──
    function getFilteredNav(data, mode) {
      if (!vaultReads || mode === 'all' || !data) return data;

      if (mode === 'read' || mode === 'unread') {
        const wantRead = mode === 'read';
        function filterReadState(node) {
          if (node.type === 'file') {
            const isRead = !!vaultReads[node.path.replace(/\\/g, '/')];
            return isRead === wantRead ? node : null;
          }
          const kids = (node.children || []).map(filterReadState).filter(Boolean);
          return kids.length ? { ...node, children: kids } : null;
        }
        return filterReadState(data);
      }

      // Sort modes: flatten all files, sort, return synthetic flat root
      const flat = [];
      function collectFiles(node) {
        if (node.type === 'file') {
          const r = vaultReads[node.path.replace(/\\/g, '/')];
          flat.push({ node, readCount: r ? r.readCount : 0, lastRead: r ? r.lastRead : 0 });
        }
        for (const c of (node.children || [])) collectFiles(c);
      }
      collectFiles(data);

      const sortFns = {
        'most-read':           (a, b) => b.readCount - a.readCount,
        'least-read':          (a, b) => a.readCount - b.readCount,
        'recently-read':       (a, b) => b.lastRead - a.lastRead,
        'least-recently-read': (a, b) => a.lastRead - b.lastRead,
      };
      flat.sort(sortFns[mode] || (() => 0));
      return { ...data, children: flat.map(f => f.node) };
    }

    function renderTree(data, query) {
      const mode = (document.getElementById('nav-filter-select') || {}).value || 'all';
      const container = document.getElementById('sidebar-tree');
      if (!data) { container.textContent = 'Navigation unavailable'; return; }
      let processed = query ? filterTree(data, query.toLowerCase()) : data;
      if (!query && mode !== 'all') processed = getFilteredNav(processed, mode);
      container.innerHTML = '';
      if (processed) container.appendChild(buildTree(processed, 0, !!query || mode !== 'all'));
      if (!query) applyReadDotsToNav();
    }

    document.getElementById('search-input').addEventListener('input', e => {
      renderTree(navData, e.target.value.trim());
    });

    async function init() {
      await checkAuthStatus();
      await loadVaultReads();
      navData = await loadNav();
      renderTree(navData, '');
    }

    const filterSelect = document.getElementById('nav-filter-select');
    filterSelect.addEventListener('change', () => renderTree(navData, document.getElementById('search-input').value.trim()));

    init();
  </script>
</body>
</html>
