<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} — {{VAULT_NAME}}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sidebar-width: 280px;
      --bg: #1e1e2e;
      --bg-sidebar: #181825;
      --bg-hover: #313244;
      --bg-active: #45475a;
      --text: #cdd6f4;
      --text-muted: #7f849c;
      --text-heading: #cba6f7;
      --accent: #89b4fa;
      --accent2: #a6e3a1;
      --border: #313244;
      --mark-bg: #f9e2af;
      --mark-text: #1e1e2e;
      --code-bg: #313244;
      --tag-bg: #313244;
      --tag-text: #89dceb;
      --blockquote-border: #cba6f7;
    }

    html.light {
      --bg: #eff1f5;
      --bg-sidebar: #e6e9ef;
      --bg-hover: #ccd0da;
      --bg-active: #bcc0cc;
      --text: #4c4f69;
      --text-muted: #8c8fa1;
      --text-heading: #8839ef;
      --accent: #1e66f5;
      --accent2: #40a02b;
      --border: #ccd0da;
      --mark-bg: #df8e1d;
      --mark-text: #eff1f5;
      --code-bg: #ccd0da;
      --tag-bg: #ccd0da;
      --tag-text: #179299;
      --blockquote-border: #8839ef;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: var(--sidebar-width);
      min-width: var(--sidebar-width);
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
      transition: width 0.2s ease, min-width 0.2s ease;
    }

    #sidebar-header {
      padding: 12px 10px 12px 16px;
      display: flex;
      align-items: center;
      gap: 6px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #vault-name {
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .header-btns { display: flex; gap: 2px; flex-shrink: 0; }

    .icon-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 3px 6px;
      border-radius: 4px;
      font-size: 0.9rem;
      line-height: 1;
      display: flex;
      align-items: center;
    }
    .icon-btn:hover { background: var(--bg-hover); color: var(--text); }

    #sidebar-search {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #sidebar-search input {
      width: 100%;
      background: var(--bg-active);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.8rem;
      padding: 5px 8px;
      outline: none;
    }
    #sidebar-search input::placeholder { color: var(--text-muted); }

    #tree-controls {
      display: flex;
      gap: 4px;
      padding: 5px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #tree-controls button {
      flex: 1;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      cursor: pointer;
      padding: 3px 0;
      border-radius: 4px;
      font-size: 0.7rem;
    }
    #tree-controls button:hover { background: var(--bg-hover); color: var(--text); border-color: var(--text-muted); }

    #sidebar-tree {
      overflow-y: auto;
      flex: 1;
      padding: 6px 0;
    }

    /* ── Tree nodes ── */
    .tree-node { user-select: none; }

    .tree-item {
      display: flex;
      align-items: center;
      padding: 3px 8px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 0.83rem;
      gap: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
      text-decoration: none;
    }

    .tree-item:hover { background: var(--bg-hover); }
    .tree-item.active { background: var(--bg-active); color: var(--accent); }

    .tree-icon { font-size: 0.9em; flex-shrink: 0; }
    .tree-label { overflow: hidden; text-overflow: ellipsis; flex: 1; }

    .tree-toggle {
      width: 14px;
      flex-shrink: 0;
      text-align: center;
      font-size: 0.7em;
      color: var(--text-muted);
      transition: transform 0.15s;
    }

    .tree-children { display: none; }
    .tree-children.open { display: block; }

    .new-badge { color: var(--accent); font-size: 0.75em; flex-shrink: 0; margin-left: 2px; }

    /* ── Sidebar resize handle ── */
    #sidebar-resize-handle {
      width: 5px;
      cursor: col-resize;
      flex-shrink: 0;
      background: transparent;
      transition: background 0.15s;
    }
    #sidebar-resize-handle:hover { background: var(--border); }
    #sidebar-resize-handle.resizing { background: var(--accent); }
    body.sidebar-collapsed #sidebar-resize-handle { display: none; }
    @media (max-width: 768px) { #sidebar-resize-handle { display: none; } }

    /* ── Desktop sidebar collapse ── */
    #sidebar-reopen-btn {
      display: none;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: 20px;
      z-index: 10;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: var(--bg-sidebar);
      border: none;
      border-right: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 1rem;
    }
    #sidebar-reopen-btn:hover { background: var(--bg-hover); color: var(--text); }

    @media (min-width: 769px) {
      body.sidebar-collapsed #sidebar { width: 0; min-width: 0; border-right: none; }
      body.sidebar-collapsed #sidebar-reopen-btn { display: flex; }
    }

    /* ── Mobile overlay ── */
    #mobile-toggle-btn { display: none; }

    #sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 150;
      background: rgba(0, 0, 0, 0.5);
    }

    @media (max-width: 768px) {
      #mobile-toggle-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        position: fixed;
        top: 10px;
        left: 10px;
        z-index: 100;
        background: var(--bg-sidebar);
        border: 1px solid var(--border);
        color: var(--text);
        width: 36px;
        height: 36px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 1.1rem;
      }

      #sidebar {
        position: fixed;
        left: 0; top: 0;
        height: 100%;
        z-index: 200;
        width: 100vw;
        min-width: 100vw;
        transform: translateX(-100%);
        transition: transform 0.25s ease;
      }

      body.sidebar-open #sidebar { transform: translateX(0); }
      body.sidebar-open #sidebar-overlay { display: block; }

      #content-wrap { padding-top: 56px; }
    }

    /* ── Main content ── */
    #content-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 32px 48px;
      max-width: 860px;
    }

    /* ── Markdown styles ── */
    #content h1, #content h2, #content h3, #content h4 {
      color: var(--text-heading);
      margin: 1.5em 0 0.5em;
      line-height: 1.3;
    }
    #content h1 { font-size: 1.9rem; }
    #content h2 { font-size: 1.45rem; }
    #content h3 { font-size: 1.15rem; }

    #content p { line-height: 1.7; margin: 0.8em 0; }

    #content a { color: var(--accent); text-decoration: none; }
    #content a:hover { text-decoration: underline; }

    #content code {
      background: var(--code-bg);
      padding: 0.15em 0.4em;
      border-radius: 4px;
      font-size: 0.88em;
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    }

    #content pre {
      background: var(--code-bg);
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
      margin: 1em 0;
    }
    #content pre code { background: none; padding: 0; font-size: 0.85rem; }

    #content blockquote {
      border-left: 3px solid var(--blockquote-border);
      padding-left: 16px;
      color: var(--text-muted);
      margin: 1em 0;
      font-style: italic;
    }

    #content ul, #content ol { padding-left: 1.5em; margin: 0.8em 0; }
    #content li { margin: 0.3em 0; line-height: 1.6; }

    #content table { border-collapse: collapse; width: 100%; margin: 1em 0; }
    #content th, #content td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
    #content th { background: var(--bg-sidebar); color: var(--text-heading); }

    #content img { max-width: 100%; border-radius: 6px; margin: 0.5em 0; }

    #content hr { border: none; border-top: 1px solid var(--border); margin: 2em 0; }

    /* Obsidian extras */
    mark { background: var(--mark-bg); color: var(--mark-text); border-radius: 2px; padding: 0 2px; }

    .tag {
      background: var(--tag-bg);
      color: var(--tag-text);
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 0.78em;
      font-weight: 500;
    }

    .wikilink-unresolved {
      color: var(--text-muted);
      text-decoration: line-through;
      cursor: help;
    }

    .transclusion {
      border-left: 3px solid var(--accent2);
      background: var(--bg-sidebar);
      padding: 8px 12px;
      border-radius: 0 6px 6px 0;
      margin: 1em 0;
      font-style: normal;
    }
    .transclusion-note { font-size: 0.78em; color: var(--text-muted); }

    #content input[type="checkbox"] { margin-right: 6px; accent-color: var(--accent); }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--bg-active); border-radius: 3px; }

    /* ── Read status bar ── */
    #read-status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 0 12px;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    #mark-read-btn {
      background: var(--bg-active);
      border: 1px solid var(--border);
      color: var(--text);
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 5px;
      font-size: 0.8rem;
      white-space: nowrap;
    }
    #mark-read-btn:hover { background: var(--bg-hover); }
    #mark-read-btn.read { color: var(--accent2); border-color: var(--accent2); }
    #auth-status-link { color: var(--text-muted); font-size: 0.78rem; text-decoration: none; margin-left: auto; white-space: nowrap; }
    #auth-status-link:hover { color: var(--accent); }
    .read-dot { color: var(--accent2); font-size: 0.72em; margin-left: 3px; flex-shrink: 0; }
  </style>
</head>
<body>
  <div id="sidebar-overlay"></div>
  <button id="mobile-toggle-btn" aria-label="Open navigation">☰</button>
  <button id="sidebar-reopen-btn" aria-label="Expand sidebar">›</button>

  <nav id="sidebar">
    <div id="sidebar-header">
      <span id="vault-name">{{VAULT_NAME}}</span>
      <div class="header-btns">
        <button class="icon-btn" id="theme-toggle-btn" title="Toggle theme">☀</button>
        <button class="icon-btn" id="sidebar-close-btn" title="Collapse sidebar">‹</button>
      </div>
    </div>
    <div id="sidebar-search"><input type="text" id="search-input" placeholder="Search files…" autocomplete="off"></div>
    <div id="tree-controls">
      <button id="expand-all-btn" title="Expand all folders">Expand all</button>
      <button id="collapse-all-btn" title="Collapse all folders">Collapse all</button>
    </div>
    <div id="sidebar-tree">Loading…</div>
  </nav>

  <div id="sidebar-resize-handle"></div>

  <div id="content-wrap">
    <article id="content">
      <div id="read-status-bar">
        <button id="mark-read-btn" style="display:none">Mark as read</button>
        <span id="read-info"></span>
        <a id="auth-status-link" href="/login.html" style="display:none"></a>
      </div>
      {{BODY}}
    </article>
  </div>

  <script>
    const ROOT_PREFIX = '{{ROOT_PREFIX}}';
    const VAULT_NAME = {{VAULT_NAME_JSON}};
    const CURRENT_PATH = location.pathname;

    // ── Theme ──
    const themeBtn = document.getElementById('theme-toggle-btn');
    function applyTheme(dark) {
      document.documentElement.classList.toggle('light', !dark);
      themeBtn.textContent = dark ? '☀' : '🌙';
    }
    applyTheme(localStorage.getItem('theme') !== 'light');
    themeBtn.addEventListener('click', () => {
      const nowLight = document.documentElement.classList.toggle('light');
      themeBtn.textContent = nowLight ? '🌙' : '☀';
      localStorage.setItem('theme', nowLight ? 'light' : 'dark');
    });

    // ── Sidebar toggle ──
    function isMobile() { return window.innerWidth <= 768; }

    function openSidebar() {
      if (isMobile()) document.body.classList.add('sidebar-open');
      else document.body.classList.remove('sidebar-collapsed');
    }
    function closeSidebar() {
      if (isMobile()) {
        document.body.classList.remove('sidebar-open');
      } else {
        document.body.classList.add('sidebar-collapsed');
        localStorage.setItem('sidebarCollapsed', '1');
      }
    }

    document.getElementById('sidebar-close-btn').addEventListener('click', closeSidebar);
    document.getElementById('mobile-toggle-btn').addEventListener('click', openSidebar);
    document.getElementById('sidebar-overlay').addEventListener('click', closeSidebar);
    document.getElementById('sidebar-reopen-btn').addEventListener('click', openSidebar);

    if (!isMobile() && localStorage.getItem('sidebarCollapsed') === '1') {
      document.body.classList.add('sidebar-collapsed');
    }

    // ── Resizable sidebar ──
    const MIN_SIDEBAR_WIDTH = 160, MAX_SIDEBAR_WIDTH = 800;
    const sidebarEl = document.getElementById('sidebar');
    const resizeHandle = document.getElementById('sidebar-resize-handle');

    if (!isMobile()) {
      const savedW = parseInt(localStorage.getItem('sidebarWidth') || '280', 10);
      document.documentElement.style.setProperty('--sidebar-width', savedW + 'px');
    }

    resizeHandle.addEventListener('mousedown', e => {
      if (isMobile() || document.body.classList.contains('sidebar-collapsed')) return;
      e.preventDefault();
      sidebarEl.style.transition = 'none';
      resizeHandle.classList.add('resizing');
      const startX = e.clientX;
      const startW = sidebarEl.getBoundingClientRect().width;

      const onMove = e => {
        const w = Math.max(MIN_SIDEBAR_WIDTH, Math.min(MAX_SIDEBAR_WIDTH, startW + (e.clientX - startX)));
        document.documentElement.style.setProperty('--sidebar-width', w + 'px');
      };
      const onUp = () => {
        localStorage.setItem('sidebarWidth', Math.round(sidebarEl.getBoundingClientRect().width));
        sidebarEl.style.transition = '';
        resizeHandle.classList.remove('resizing');
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });

    // ── Expand / Collapse all ──
    document.getElementById('expand-all-btn').addEventListener('click', () => {
      document.querySelectorAll('.tree-children').forEach(el => el.classList.add('open'));
      document.querySelectorAll('.tree-toggle').forEach(el => el.style.transform = 'rotate(90deg)');
    });
    document.getElementById('collapse-all-btn').addEventListener('click', () => {
      document.querySelectorAll('.tree-children').forEach(el => el.classList.remove('open'));
      document.querySelectorAll('.tree-toggle').forEach(el => el.style.transform = '');
    });

    // ── Navigation ──
    async function loadNav() {
      try {
        const res = await fetch(ROOT_PREFIX + '_nav.json');
        if (!res.ok) throw new Error(res.status);
        return await res.json();
      } catch {
        return null;
      }
    }

    function buildTree(node, depth, forceOpen) {
      const div = document.createElement('div');
      div.className = 'tree-node';
      div.style.paddingLeft = (depth * 14) + 'px';

      if (node.type === 'dir' && depth > 0) {
        const item = document.createElement('div');
        item.className = 'tree-item dir-item';
        const dirBadge = node.isNew ? '<span class="new-badge" title="Contains new content">★</span>' : '';
        item.innerHTML = `<span class="tree-toggle">▶</span><span class="tree-icon">📁</span><span class="tree-label">${esc(node.name)}</span>${dirBadge}`;

        const children = document.createElement('div');
        children.className = 'tree-children';

        if (node.children && node.children.length) {
          item.addEventListener('click', () => {
            const open = children.classList.toggle('open');
            item.querySelector('.tree-toggle').style.transform = open ? 'rotate(90deg)' : '';
          });
          for (const child of node.children) children.appendChild(buildTree(child, depth + 1, forceOpen));
        }

        div.appendChild(item);
        div.appendChild(children);

        const shouldOpen = forceOpen ||
          CURRENT_PATH.includes('/' + node.path + '/') ||
          CURRENT_PATH.includes('/' + node.path.replace(/\\/g, '/') + '/');
        if (shouldOpen) {
          children.classList.add('open');
          item.querySelector('.tree-toggle').style.transform = 'rotate(90deg)';
        }

      } else if (node.type === 'file') {
        const a = document.createElement('a');
        a.href = ROOT_PREFIX + node.path;
        a.className = 'tree-item file-item';
        const icon = node.name.endsWith('.html') ? '📄' : '📎';
        const label = node.name.replace(/\.html$/, '');
        const fileBadge = node.isNew ? '<span class="new-badge" title="New content">★</span>' : '';
        a.innerHTML = `<span class="tree-icon">${icon}</span><span class="tree-label">${esc(label)}</span>${fileBadge}`;

        if (decodeURIComponent(location.pathname).endsWith('/' + node.path.replace(/\\/g, '/'))) {
          a.classList.add('active');
          let parent = div.parentElement;
          while (parent) {
            const ch = parent.querySelector('.tree-children');
            const tog = parent.querySelector('.tree-toggle');
            if (ch) { ch.classList.add('open'); if (tog) tog.style.transform = 'rotate(90deg)'; }
            parent = parent.parentElement;
          }
        }

        div.appendChild(a);

      } else if (depth === 0 && node.type === 'dir') {
        for (const child of (node.children || [])) div.appendChild(buildTree(child, depth + 1, forceOpen));
      }

      return div;
    }

    function esc(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function filterTree(node, query) {
      if (!query) return node;
      if (node.type === 'file') {
        return node.name.toLowerCase().includes(query) ? node : null;
      }
      const filteredChildren = (node.children || []).map(c => filterTree(c, query)).filter(Boolean);
      if (filteredChildren.length === 0) return null;
      return { ...node, children: filteredChildren };
    }

    let navData = null;
    let currentUser = null;
    let vaultReads = null;

    // ── Auth ──
    async function checkAuthStatus() {
      try {
        const res = await fetch('/auth/status');
        if (!res.ok) return;
        const data = await res.json();
        currentUser = data.loggedIn ? data.username : null;
      } catch { currentUser = null; }
      const link = document.getElementById('auth-status-link');
      if (!currentUser) {
        link.textContent = 'Log in to track reading';
        link.href = '/login.html?return=' + encodeURIComponent(location.pathname);
        link.style.display = '';
      } else {
        link.textContent = currentUser + ' · Log out';
        link.href = '#';
        link.style.display = '';
        link.onclick = async (e) => {
          e.preventDefault();
          await fetch('/auth/logout', { method: 'POST' });
          currentUser = null;
          vaultReads = null;
          link.textContent = 'Log in to track reading';
          link.href = '/login.html?return=' + encodeURIComponent(location.pathname);
          link.onclick = null;
          document.getElementById('mark-read-btn').style.display = 'none';
          document.getElementById('read-info').textContent = '';
        };
      }
    }

    // ── Vault-wide reads (for nav dots) ──
    async function loadVaultReads() {
      if (!currentUser) return;
      try {
        const res = await fetch('/api/reads/vault?vault=' + encodeURIComponent(VAULT_NAME));
        if (!res.ok) return;
        const data = await res.json();
        vaultReads = {};
        for (const r of data.reads) vaultReads[r.docPath.replace(/\\/g, '/')] = r;
      } catch { vaultReads = null; }
    }

    function applyReadDotsToNav() {
      if (!vaultReads) return;
      document.querySelectorAll('.file-item').forEach(el => {
        const href = el.getAttribute('href') || '';
        const docPath = href.startsWith(ROOT_PREFIX)
          ? href.slice(ROOT_PREFIX.length)
          : href.replace(/^\//, '');
        if (vaultReads[docPath] && !el.querySelector('.read-dot')) {
          el.insertAdjacentHTML('beforeend', '<span class="read-dot" title="Read">✓</span>');
        }
      });
    }

    // ── Per-doc read status ──
    async function loadDocReadStatus() {
      if (!currentUser) return;
      const docPath = CURRENT_PATH.replace(/^\//, '');
      try {
        const res = await fetch('/api/reads/doc?vault=' + encodeURIComponent(VAULT_NAME) + '&path=' + encodeURIComponent(docPath));
        if (!res.ok) return;
        const data = await res.json();
        const btn = document.getElementById('mark-read-btn');
        const info = document.getElementById('read-info');
        btn.style.display = '';
        if (data.read) {
          btn.textContent = 'Read again';
          btn.classList.add('read');
          info.textContent = 'Read ' + data.readCount + '× · Last: ' + new Date(data.lastRead * 1000).toLocaleDateString();
        } else {
          btn.textContent = 'Mark as read';
          btn.classList.remove('read');
          info.textContent = '';
        }
      } catch {}
    }

    async function markAsRead() {
      if (!currentUser) { location.href = '/login.html?return=' + encodeURIComponent(location.pathname); return; }
      const docPath = CURRENT_PATH.replace(/^\//, '');
      try {
        const res = await fetch('/api/reads/mark', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ vaultName: VAULT_NAME, docPath }),
        });
        if (!res.ok) return;
        const data = await res.json();
        const btn = document.getElementById('mark-read-btn');
        const info = document.getElementById('read-info');
        btn.textContent = 'Read again';
        btn.classList.add('read');
        info.textContent = 'Read ' + data.readCount + '× · Last: ' + new Date(data.lastRead * 1000).toLocaleDateString();
        if (vaultReads) {
          vaultReads[docPath] = { readCount: data.readCount, lastRead: data.lastRead };
          applyReadDotsToNav();
        }
      } catch {}
    }

    document.getElementById('mark-read-btn').addEventListener('click', markAsRead);

    async function init() {
      await checkAuthStatus();
      await loadVaultReads();
      navData = await loadNav();
      renderTree(navData, '');
      applyReadDotsToNav();
      await loadDocReadStatus();
    }

    function renderTree(data, query) {
      const container = document.getElementById('sidebar-tree');
      if (!data) { container.textContent = 'Navigation unavailable'; return; }
      const filtered = query ? filterTree(data, query.toLowerCase()) : data;
      container.innerHTML = '';
      if (filtered) container.appendChild(buildTree(filtered, 0, !!query));
    }

    document.getElementById('search-input').addEventListener('input', (e) => {
      renderTree(navData, e.target.value.trim());
    });

    init();
  </script>
</body>
</html>
