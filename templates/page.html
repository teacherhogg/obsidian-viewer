<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} — {{VAULT_NAME}}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sidebar-width: 280px;
      --bg: #1e1e2e;
      --bg-sidebar: #181825;
      --bg-hover: #313244;
      --bg-active: #45475a;
      --text: #cdd6f4;
      --text-muted: #7f849c;
      --text-heading: #cba6f7;
      --accent: #89b4fa;
      --accent2: #a6e3a1;
      --border: #313244;
      --mark-bg: #f9e2af;
      --mark-text: #1e1e2e;
      --code-bg: #313244;
      --tag-bg: #313244;
      --tag-text: #89dceb;
      --blockquote-border: #cba6f7;
    }

    html.light {
      --bg: #eff1f5;
      --bg-sidebar: #e6e9ef;
      --bg-hover: #ccd0da;
      --bg-active: #bcc0cc;
      --text: #4c4f69;
      --text-muted: #8c8fa1;
      --text-heading: #8839ef;
      --accent: #1e66f5;
      --accent2: #40a02b;
      --border: #ccd0da;
      --mark-bg: #df8e1d;
      --mark-text: #eff1f5;
      --code-bg: #ccd0da;
      --tag-bg: #ccd0da;
      --tag-text: #179299;
      --blockquote-border: #8839ef;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: var(--sidebar-width);
      min-width: var(--sidebar-width);
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
      transition: width 0.2s ease, min-width 0.2s ease;
    }

    #sidebar-header {
      padding: 12px 10px 12px 16px;
      display: flex;
      align-items: center;
      gap: 6px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #vault-name {
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .header-btns { display: flex; gap: 2px; flex-shrink: 0; }

    .icon-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 3px 6px;
      border-radius: 4px;
      font-size: 0.9rem;
      line-height: 1;
      display: flex;
      align-items: center;
    }
    .icon-btn:hover { background: var(--bg-hover); color: var(--text); }

    #sidebar-search {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #sidebar-search input {
      width: 100%;
      background: var(--bg-active);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.8rem;
      padding: 5px 8px;
      outline: none;
    }
    #sidebar-search input::placeholder { color: var(--text-muted); }

    #tree-controls {
      display: flex;
      gap: 4px;
      padding: 5px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #tree-controls button {
      flex: 1;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      cursor: pointer;
      padding: 3px 0;
      border-radius: 4px;
      font-size: 0.7rem;
    }
    #tree-controls button:hover { background: var(--bg-hover); color: var(--text); border-color: var(--text-muted); }

    #sidebar-tree {
      overflow-y: auto;
      flex: 1;
      padding: 6px 0;
    }

    /* ── Tree nodes ── */
    .tree-node { user-select: none; }

    .tree-item {
      display: flex;
      align-items: center;
      padding: 3px 8px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 0.83rem;
      gap: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
      text-decoration: none;
    }

    .tree-item:hover { background: var(--bg-hover); }
    .tree-item.active { background: var(--bg-active); color: var(--accent); }

    .tree-icon { font-size: 0.9em; flex-shrink: 0; }
    .tree-label { overflow: hidden; text-overflow: ellipsis; flex: 1; }

    .tree-toggle {
      width: 14px;
      flex-shrink: 0;
      text-align: center;
      font-size: 0.7em;
      color: var(--text-muted);
      transition: transform 0.15s;
    }

    .tree-children { display: none; }
    .tree-children.open { display: block; }

    .new-badge { color: var(--accent); font-size: 0.75em; flex-shrink: 0; margin-left: 2px; }

    /* ── Sidebar resize handle ── */
    #sidebar-resize-handle {
      width: 5px;
      cursor: col-resize;
      flex-shrink: 0;
      background: transparent;
      transition: background 0.15s;
    }
    #sidebar-resize-handle:hover { background: var(--border); }
    #sidebar-resize-handle.resizing { background: var(--accent); }
    body.sidebar-collapsed #sidebar-resize-handle { display: none; }
    @media (max-width: 768px) { #sidebar-resize-handle { display: none; } }

    /* ── Desktop sidebar collapse ── */
    #sidebar-reopen-btn {
      display: none;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: 20px;
      z-index: 10;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: var(--bg-sidebar);
      border: none;
      border-right: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 1rem;
    }
    #sidebar-reopen-btn:hover { background: var(--bg-hover); color: var(--text); }

    @media (min-width: 769px) {
      body.sidebar-collapsed #sidebar { width: 0; min-width: 0; border-right: none; }
      body.sidebar-collapsed #sidebar-reopen-btn { display: flex; }
    }

    /* ── Mobile overlay ── */
    #mobile-toggle-btn { display: none; }

    #sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 150;
      background: rgba(0, 0, 0, 0.5);
    }

    @media (max-width: 768px) {
      #mobile-toggle-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        position: fixed;
        top: 10px;
        left: 10px;
        z-index: 100;
        background: var(--bg-sidebar);
        border: 1px solid var(--border);
        color: var(--text);
        width: 36px;
        height: 36px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 1.1rem;
      }

      #sidebar {
        position: fixed;
        left: 0; top: 0;
        height: 100%;
        z-index: 200;
        width: 100vw;
        min-width: 100vw;
        transform: translateX(-100%);
        transition: transform 0.25s ease;
      }

      body.sidebar-open #sidebar { transform: translateX(0); }
      body.sidebar-open #sidebar-overlay { display: block; }

      #content-wrap { padding-top: 56px; }
    }

    /* ── Main content ── */
    #content-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 32px 48px;
    }

    #content {
      max-width: 860px;
      margin: 0 auto;
    }

    /* ── Markdown styles ── */
    #content h1, #content h2, #content h3, #content h4 {
      color: var(--text-heading);
      margin: 1.5em 0 0.5em;
      line-height: 1.3;
    }
    #content h1 { font-size: 1.9rem; }
    #content h2 { font-size: 1.45rem; }
    #content h3 { font-size: 1.15rem; }

    #content p { line-height: 1.7; margin: 0.8em 0; }

    #content a { color: var(--accent); text-decoration: none; }
    #content a:hover { text-decoration: underline; }

    #content code {
      background: var(--code-bg);
      padding: 0.15em 0.4em;
      border-radius: 4px;
      font-size: 0.88em;
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    }

    #content pre {
      background: var(--code-bg);
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
      margin: 1em 0;
    }
    #content pre code { background: none; padding: 0; font-size: 0.85rem; }

    #content blockquote {
      border-left: 3px solid var(--blockquote-border);
      padding-left: 16px;
      color: var(--text-muted);
      margin: 1em 0;
      font-style: italic;
    }

    #content ul, #content ol { padding-left: 1.5em; margin: 0.8em 0; }
    #content li { margin: 0.3em 0; line-height: 1.6; }

    #content table { border-collapse: collapse; width: 100%; margin: 1em 0; }
    #content th, #content td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
    #content th { background: var(--bg-sidebar); color: var(--text-heading); }

    #content img { max-width: 100%; border-radius: 6px; margin: 0.5em 0; }

    #content hr { border: none; border-top: 1px solid var(--border); margin: 2em 0; }

    /* Obsidian extras */
    mark { background: var(--mark-bg); color: var(--mark-text); border-radius: 2px; padding: 0 2px; }

    .tag {
      background: var(--tag-bg);
      color: var(--tag-text);
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 0.78em;
      font-weight: 500;
    }

    .wikilink-unresolved {
      color: var(--text-muted);
      text-decoration: line-through;
      cursor: help;
    }

    .transclusion {
      border-left: 3px solid var(--accent2);
      background: var(--bg-sidebar);
      padding: 8px 12px;
      border-radius: 0 6px 6px 0;
      margin: 1em 0;
      font-style: normal;
    }
    .transclusion-note { font-size: 0.78em; color: var(--text-muted); }

    #content input[type="checkbox"] { margin-right: 6px; accent-color: var(--accent); }

    #content img:not([data-no-lightbox]) { cursor: zoom-in; }

    /* ── Lightbox ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.85);
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: 95vw;
      max-height: 95vh;
      object-fit: contain;
      border-radius: 6px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
      cursor: default;
    }
    #lightbox-close {
      position: absolute;
      top: 16px; right: 20px;
      background: none;
      border: none;
      color: #fff;
      font-size: 2rem;
      line-height: 1;
      cursor: pointer;
      opacity: 0.7;
    }
    #lightbox-close:hover { opacity: 1; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--bg-active); border-radius: 3px; }

    /* ── Quiz Modal ── */
    #quiz-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.75);
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #quiz-modal.open { display: flex; }
    #quiz-modal-inner {
      background: var(--bg-sidebar);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 100%;
      max-width: 680px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 28px 32px;
      position: relative;
    }
    #quiz-close-btn {
      position: absolute;
      top: 14px; right: 18px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.4rem;
      cursor: pointer;
      line-height: 1;
    }
    #quiz-close-btn:hover { color: var(--text); }

    /* Loading */
    .quiz-loading { text-align: center; padding: 40px 0; color: var(--text-muted); }
    @keyframes quiz-spin { to { transform: rotate(360deg); } }
    .quiz-spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: quiz-spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    /* Error */
    .quiz-error { text-align: center; padding: 32px 0; color: #f38ba8; }

    /* Select screen */
    .quiz-select h2 { color: var(--text-heading); margin-bottom: 16px; font-size: 1.1rem; }
    .quiz-version-card {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-active);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 10px;
    }
    .quiz-version-info { flex: 1; display: flex; flex-direction: column; gap: 3px; font-size: 0.82rem; }
    .quiz-version-date { color: var(--text); font-weight: 600; }
    .quiz-version-count { color: var(--text-muted); }
    .quiz-version-last { color: var(--accent2); }
    .quiz-start-btn {
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 6px;
      padding: 7px 16px;
      font-size: 0.85rem;
      cursor: pointer;
      white-space: nowrap;
      font-weight: 600;
    }
    .quiz-start-btn:hover { opacity: 0.85; }
    .quiz-gen-btn {
      width: 100%;
      margin-top: 8px;
      background: none;
      border: 1px dashed var(--border);
      color: var(--text-muted);
      border-radius: 8px;
      padding: 10px;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .quiz-gen-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--bg-hover); }

    /* Question & feedback screens */
    .quiz-progress-line { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 12px; }
    .quiz-question-text {
      font-size: 1rem;
      line-height: 1.6;
      color: var(--text);
      margin-bottom: 20px;
      font-weight: 500;
    }
    .quiz-answers { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .quiz-answer-btn {
      text-align: left;
      background: var(--bg-active);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 7px;
      padding: 10px 14px;
      font-size: 0.88rem;
      cursor: pointer;
      line-height: 1.4;
    }
    .quiz-answer-btn:hover { background: var(--bg-hover); border-color: var(--accent); }
    .quiz-answer-btn.selected { border-color: var(--accent); background: var(--bg-hover); color: var(--accent); }
    .quiz-answer-check {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: var(--bg-active);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 10px 14px;
      font-size: 0.88rem;
      cursor: pointer;
      line-height: 1.4;
    }
    .quiz-answer-check:hover { background: var(--bg-hover); border-color: var(--accent); }
    .quiz-answer-check input { margin-top: 2px; accent-color: var(--accent); flex-shrink: 0; }
    .quiz-ms-hint, .quiz-qa-hint { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 16px; font-style: italic; }
    .quiz-nav { display: flex; justify-content: flex-end; margin-top: 8px; }
    .quiz-next-btn {
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 7px;
      padding: 9px 22px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
    }
    .quiz-next-btn:hover:not(:disabled) { opacity: 0.85; }
    .quiz-next-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Feedback */
    .quiz-result-banner {
      font-size: 1.1rem;
      font-weight: 700;
      border-radius: 8px;
      padding: 10px 16px;
      margin-bottom: 16px;
    }
    .quiz-result-banner.correct { background: rgba(166,227,161,0.15); color: var(--accent2); }
    .quiz-result-banner.incorrect { background: rgba(243,139,168,0.15); color: #f38ba8; }
    .quiz-correct-answer { font-size: 0.88rem; color: var(--text); margin-bottom: 12px; }
    .quiz-correct-answer strong { color: var(--text-heading); }
    .quiz-model-answer {
      background: var(--bg-active);
      border-left: 3px solid var(--accent2);
      border-radius: 0 6px 6px 0;
      padding: 12px 16px;
      font-size: 0.88rem;
      color: var(--text);
      margin-bottom: 12px;
      line-height: 1.6;
    }
    .quiz-explanation {
      font-size: 0.82rem;
      color: var(--text-muted);
      font-style: italic;
      margin-bottom: 16px;
      line-height: 1.5;
    }
    .quiz-self-grade-prompt { font-size: 0.88rem; color: var(--text-muted); margin-bottom: 10px; }
    .quiz-self-grade { display: flex; gap: 10px; }
    .quiz-grade-btn {
      flex: 1;
      border: none;
      border-radius: 7px;
      padding: 9px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
    }
    .quiz-grade-correct { background: rgba(166,227,161,0.2); color: var(--accent2); border: 1px solid var(--accent2); }
    .quiz-grade-correct:hover { background: rgba(166,227,161,0.35); }
    .quiz-grade-wrong { background: rgba(243,139,168,0.2); color: #f38ba8; border: 1px solid #f38ba8; }
    .quiz-grade-wrong:hover { background: rgba(243,139,168,0.35); }

    /* Finish screen */
    .quiz-finish-screen h2 { color: var(--text-heading); margin-bottom: 12px; font-size: 1.15rem; }
    .quiz-score { font-size: 2.5rem; font-weight: 700; color: var(--accent); margin-bottom: 20px; }
    .quiz-review { display: flex; flex-direction: column; gap: 6px; margin-bottom: 24px; }
    .quiz-review-item {
      font-size: 0.82rem;
      padding: 6px 10px;
      border-radius: 5px;
      line-height: 1.4;
    }
    .quiz-review-item.correct { background: rgba(166,227,161,0.1); color: var(--accent2); }
    .quiz-review-item.incorrect { background: rgba(243,139,168,0.1); color: #f38ba8; }

    /* Status bar quiz elements */
    #quiz-me-btn {
      background: var(--bg-active);
      border: 1px solid var(--border);
      color: var(--text);
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 5px;
      font-size: 0.8rem;
      white-space: nowrap;
    }
    #quiz-me-btn:hover { background: var(--bg-hover); }
    #quiz-info { font-size: 0.8rem; color: var(--text-muted); }
    .quiz-divider { color: var(--border); margin: 0 4px; }

    /* ── Read status bar ── */
    #read-status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 0 12px;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    #mark-read-btn {
      background: var(--bg-active);
      border: 1px solid var(--border);
      color: var(--text);
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 5px;
      font-size: 0.8rem;
      white-space: nowrap;
    }
    #mark-read-btn:hover { background: var(--bg-hover); }
    #mark-read-btn.read { color: var(--accent2); border-color: var(--accent2); }
    #auth-status-link { color: var(--text-muted); font-size: 0.78rem; text-decoration: none; margin-left: auto; white-space: nowrap; }
    #auth-status-link:hover { color: var(--accent); }
    .read-dot { color: var(--accent2); font-size: 0.72em; margin-left: 3px; flex-shrink: 0; }
    .days-badge { color: var(--text-muted); font-size: 0.68em; flex-shrink: 0; margin-left: 2px; }
    .unread-badge { color: #f38ba8; font-size: 0.7em; flex-shrink: 0; margin-left: 2px; }
  </style>
</head>
<body>
  <div id="sidebar-overlay"></div>
  <button id="mobile-toggle-btn" aria-label="Open navigation">☰</button>
  <button id="sidebar-reopen-btn" aria-label="Expand sidebar">›</button>

  <nav id="sidebar">
    <div id="sidebar-header">
      <span id="vault-name">{{VAULT_NAME}}</span>
      <div class="header-btns">
        <button class="icon-btn" id="theme-toggle-btn" title="Toggle theme">☀</button>
        <button class="icon-btn" id="sidebar-close-btn" title="Collapse sidebar">‹</button>
      </div>
    </div>
    <div id="sidebar-search"><input type="text" id="search-input" placeholder="Search files…" autocomplete="off"></div>
    <div id="tree-controls">
      <button id="expand-all-btn" title="Expand all folders">Expand all</button>
      <button id="collapse-all-btn" title="Collapse all folders">Collapse all</button>
    </div>
    <div id="sidebar-tree">Loading…</div>
  </nav>

  <div id="sidebar-resize-handle"></div>

  <div id="lightbox">
    <button id="lightbox-close" aria-label="Close">✕</button>
    <img id="lightbox-img" src="" alt="">
  </div>

  <div id="quiz-modal">
    <div id="quiz-modal-inner">
      <button id="quiz-close-btn" aria-label="Close quiz">✕</button>
      <div id="quiz-screen"></div>
    </div>
  </div>

  <div id="content-wrap">
    <article id="content">
      <div id="read-status-bar">
        <button id="mark-read-btn" style="display:none">Mark as read</button>
        <span id="read-info"></span>
        <span class="quiz-divider" id="quiz-divider" style="display:none">|</span>
        <button id="quiz-me-btn" style="display:none">Quiz Me</button>
        <span id="quiz-info"></span>
        <a id="auth-status-link" href="/login.html" style="display:none"></a>
      </div>
      {{BODY}}
    </article>
  </div>

  <script>
    const ROOT_PREFIX = '{{ROOT_PREFIX}}';
    const VAULT_NAME = {{VAULT_NAME_JSON}};
    const CURRENT_PATH = (() => { try { return decodeURIComponent(location.pathname); } catch { return location.pathname; } })();

    function calendarDaysAgo(ts) {
      const now = new Date(), read = new Date(ts * 1000);
      const todayMid = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const readMid  = new Date(read.getFullYear(), read.getMonth(), read.getDate());
      return Math.round((todayMid - readMid) / 86400000);
    }
    function fmtDate(ts) {
      const d = new Date(ts * 1000);
      return d.getFullYear() + '/' +
        String(d.getMonth() + 1).padStart(2, '0') + '/' +
        String(d.getDate()).padStart(2, '0');
    }

    // ── Theme ──
    const themeBtn = document.getElementById('theme-toggle-btn');
    function applyTheme(dark) {
      document.documentElement.classList.toggle('light', !dark);
      themeBtn.textContent = dark ? '☀' : '🌙';
    }
    applyTheme(localStorage.getItem('theme') !== 'light');
    themeBtn.addEventListener('click', () => {
      const nowLight = document.documentElement.classList.toggle('light');
      themeBtn.textContent = nowLight ? '🌙' : '☀';
      localStorage.setItem('theme', nowLight ? 'light' : 'dark');
    });

    // ── Sidebar toggle ──
    function isMobile() { return window.innerWidth <= 768; }

    function openSidebar() {
      if (isMobile()) document.body.classList.add('sidebar-open');
      else document.body.classList.remove('sidebar-collapsed');
    }
    function closeSidebar() {
      if (isMobile()) {
        document.body.classList.remove('sidebar-open');
      } else {
        document.body.classList.add('sidebar-collapsed');
        localStorage.setItem('sidebarCollapsed', '1');
      }
    }

    document.getElementById('sidebar-close-btn').addEventListener('click', closeSidebar);
    document.getElementById('mobile-toggle-btn').addEventListener('click', openSidebar);
    document.getElementById('sidebar-overlay').addEventListener('click', closeSidebar);
    document.getElementById('sidebar-reopen-btn').addEventListener('click', openSidebar);

    if (!isMobile() && localStorage.getItem('sidebarCollapsed') === '1') {
      document.body.classList.add('sidebar-collapsed');
    }

    // ── Resizable sidebar ──
    const MIN_SIDEBAR_WIDTH = 160, MAX_SIDEBAR_WIDTH = 800;
    const sidebarEl = document.getElementById('sidebar');
    const resizeHandle = document.getElementById('sidebar-resize-handle');

    if (!isMobile()) {
      const savedW = parseInt(localStorage.getItem('sidebarWidth') || '280', 10);
      document.documentElement.style.setProperty('--sidebar-width', savedW + 'px');
    }

    resizeHandle.addEventListener('mousedown', e => {
      if (isMobile() || document.body.classList.contains('sidebar-collapsed')) return;
      e.preventDefault();
      sidebarEl.style.transition = 'none';
      resizeHandle.classList.add('resizing');
      const startX = e.clientX;
      const startW = sidebarEl.getBoundingClientRect().width;

      const onMove = e => {
        const w = Math.max(MIN_SIDEBAR_WIDTH, Math.min(MAX_SIDEBAR_WIDTH, startW + (e.clientX - startX)));
        document.documentElement.style.setProperty('--sidebar-width', w + 'px');
      };
      const onUp = () => {
        localStorage.setItem('sidebarWidth', Math.round(sidebarEl.getBoundingClientRect().width));
        sidebarEl.style.transition = '';
        resizeHandle.classList.remove('resizing');
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });

    // ── Expand / Collapse all ──
    document.getElementById('expand-all-btn').addEventListener('click', () => {
      document.querySelectorAll('.tree-children').forEach(el => el.classList.add('open'));
      document.querySelectorAll('.tree-toggle').forEach(el => el.style.transform = 'rotate(90deg)');
    });
    document.getElementById('collapse-all-btn').addEventListener('click', () => {
      document.querySelectorAll('.tree-children').forEach(el => el.classList.remove('open'));
      document.querySelectorAll('.tree-toggle').forEach(el => el.style.transform = '');
    });

    // ── Navigation ──
    async function loadNav() {
      try {
        const res = await fetch(ROOT_PREFIX + '_nav.json');
        if (!res.ok) throw new Error(res.status);
        return await res.json();
      } catch {
        return null;
      }
    }

    function buildTree(node, depth, forceOpen) {
      const div = document.createElement('div');
      div.className = 'tree-node';
      div.style.paddingLeft = (depth * 14) + 'px';

      if (node.type === 'dir' && depth > 0) {
        const item = document.createElement('div');
        item.className = 'tree-item dir-item';
        const dirBadge = node.isNew ? '<span class="new-badge" title="Contains new content">★</span>' : '';
        item.innerHTML = `<span class="tree-toggle">▶</span><span class="tree-icon">📁</span><span class="tree-label">${esc(node.name)}</span>${dirBadge}`;

        const children = document.createElement('div');
        children.className = 'tree-children';

        if (node.children && node.children.length) {
          item.addEventListener('click', () => {
            const open = children.classList.toggle('open');
            item.querySelector('.tree-toggle').style.transform = open ? 'rotate(90deg)' : '';
          });
          for (const child of node.children) children.appendChild(buildTree(child, depth + 1, forceOpen));
        }

        div.appendChild(item);
        div.appendChild(children);

        const shouldOpen = forceOpen ||
          CURRENT_PATH.includes('/' + node.path + '/') ||
          CURRENT_PATH.includes('/' + node.path.replace(/\\/g, '/') + '/');
        if (shouldOpen) {
          children.classList.add('open');
          item.querySelector('.tree-toggle').style.transform = 'rotate(90deg)';
        }

      } else if (node.type === 'file') {
        const a = document.createElement('a');
        a.href = ROOT_PREFIX + node.path;
        a.className = 'tree-item file-item';
        const icon = node.name.endsWith('.html') ? '📄' : '📎';
        const label = node.name.replace(/\.html$/, '');
        const fileBadge = node.isNew ? '<span class="new-badge" title="New content">★</span>' : '';
        a.innerHTML = `<span class="tree-icon">${icon}</span><span class="tree-label">${esc(label)}</span>${fileBadge}`;

        if (decodeURIComponent(location.pathname).endsWith('/' + node.path.replace(/\\/g, '/'))) {
          a.classList.add('active');
          let parent = div.parentElement;
          while (parent) {
            const ch = parent.querySelector('.tree-children');
            const tog = parent.querySelector('.tree-toggle');
            if (ch) { ch.classList.add('open'); if (tog) tog.style.transform = 'rotate(90deg)'; }
            parent = parent.parentElement;
          }
        }

        div.appendChild(a);

      } else if (depth === 0 && node.type === 'dir') {
        for (const child of (node.children || [])) div.appendChild(buildTree(child, depth + 1, forceOpen));
      }

      return div;
    }

    function esc(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function filterTree(node, query) {
      if (!query) return node;
      if (node.type === 'file') {
        return node.name.toLowerCase().includes(query) ? node : null;
      }
      const filteredChildren = (node.children || []).map(c => filterTree(c, query)).filter(Boolean);
      if (filteredChildren.length === 0) return null;
      return { ...node, children: filteredChildren };
    }

    let navData = null;
    let currentUser = null;
    let vaultReads = null;

    // ── Auth ──
    async function checkAuthStatus() {
      try {
        const res = await fetch('/auth/status');
        if (!res.ok) return;
        const data = await res.json();
        currentUser = data.loggedIn ? data.username : null;
      } catch { currentUser = null; }
      const link = document.getElementById('auth-status-link');
      if (!currentUser) {
        link.textContent = 'Log in to track reading';
        link.href = '/login.html?return=' + encodeURIComponent(location.pathname);
        link.style.display = '';
      } else {
        link.textContent = currentUser + ' · Log out';
        link.href = '#';
        link.style.display = '';
        link.onclick = async (e) => {
          e.preventDefault();
          await fetch('/auth/logout', { method: 'POST' });
          currentUser = null;
          vaultReads = null;
          link.textContent = 'Log in to track reading';
          link.href = '/login.html?return=' + encodeURIComponent(location.pathname);
          link.onclick = null;
          document.getElementById('mark-read-btn').style.display = 'none';
          document.getElementById('read-info').textContent = '';
        };
      }
    }

    // ── Vault-wide reads (for nav dots) ──
    async function loadVaultReads() {
      if (!currentUser) return;
      try {
        const res = await fetch('/api/reads/vault?vault=' + encodeURIComponent(VAULT_NAME));
        if (!res.ok) return;
        const data = await res.json();
        vaultReads = {};
        for (const r of data.reads) {
          const key = (() => { try { return decodeURIComponent(r.docPath.replace(/\\/g, '/')); } catch { return r.docPath.replace(/\\/g, '/'); } })();
          vaultReads[key] = r;
        }
      } catch { vaultReads = null; }
    }

    function applyReadDotsToNav() {
      if (!currentUser) return;

      // Apply read/unread badges to file items first
      document.querySelectorAll('.file-item').forEach(el => {
        const href = el.getAttribute('href') || '';
        const rawPath = href.startsWith(ROOT_PREFIX)
          ? href.slice(ROOT_PREFIX.length)
          : href.replace(/^\//, '');
        const docPath = (() => { try { return decodeURIComponent(rawPath); } catch { return rawPath; } })();

        el.querySelectorAll('.read-dot, .days-badge, .unread-badge').forEach(b => b.remove());

        if (vaultReads && vaultReads[docPath]) {
          const days = calendarDaysAgo(vaultReads[docPath].lastRead);
          const daysText = days === 0 ? '0d' : `${days}d`;
          el.insertAdjacentHTML('beforeend',
            `<span class="read-dot" title="Read">✓</span>` +
            `<span class="days-badge" title="Last read ${days} day${days !== 1 ? 's' : ''} ago">${daysText}</span>`
          );
        } else {
          el.insertAdjacentHTML('beforeend', '<span class="unread-badge" title="Never read">⬤</span>');
        }
      });

      // Bubble unread badge up to folder items if any descendant file is unread
      document.querySelectorAll('.dir-item').forEach(el => {
        el.querySelectorAll('.unread-badge').forEach(b => b.remove());
        const children = el.nextElementSibling; // .tree-children sibling
        if (children && children.querySelector('.file-item .unread-badge')) {
          el.insertAdjacentHTML('beforeend', '<span class="unread-badge" title="Contains unread articles">⬤</span>');
        }
      });
    }

    // ── Showcase card read status ──
    function updateShowcaseCards() {
      const cards = document.querySelectorAll('[data-doc-path]');
      if (!cards.length) return;
      cards.forEach(card => {
        const caption = card.querySelector('.read-caption');
        if (!caption) return;
        if (!currentUser) return;
        const docPath = card.getAttribute('data-doc-path');
        if (vaultReads && vaultReads[docPath]) {
          const days = calendarDaysAgo(vaultReads[docPath].lastRead);
          caption.textContent = days === 0 ? 'Read today' : `Last Read: ${days} day${days !== 1 ? 's' : ''} ago`;
          caption.classList.remove('never-read');
        } else {
          caption.textContent = 'Never Read';
          caption.classList.add('never-read');
        }
      });
    }

    // ── Per-doc read status ──
    async function loadDocReadStatus() {
      if (!currentUser) return;
      if (document.querySelector('[data-is-showcase]')) return;
      const docPath = CURRENT_PATH.replace(/^\//, '');
      try {
        const res = await fetch('/api/reads/doc?vault=' + encodeURIComponent(VAULT_NAME) + '&path=' + encodeURIComponent(docPath));
        if (!res.ok) return;
        const data = await res.json();
        const btn = document.getElementById('mark-read-btn');
        const info = document.getElementById('read-info');
        btn.style.display = '';
        if (data.read) {
          btn.textContent = 'Read again';
          btn.classList.add('read');
          const dDays = calendarDaysAgo(data.lastRead);
          const dAgo = dDays === 0 ? 'today' : `${dDays} day${dDays !== 1 ? 's' : ''} ago`;
          info.textContent = 'Read ' + data.readCount + '× · Last: ' + fmtDate(data.lastRead) + ' (' + dAgo + ')';
        } else {
          btn.textContent = 'Mark as read';
          btn.classList.remove('read');
          info.textContent = '';
        }
      } catch {}
    }

    async function markAsRead() {
      if (!currentUser) { location.href = '/login.html?return=' + encodeURIComponent(location.pathname); return; }
      const docPath = CURRENT_PATH.replace(/^\//, '');
      try {
        const res = await fetch('/api/reads/mark', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ vaultName: VAULT_NAME, docPath }),
        });
        if (!res.ok) return;
        const data = await res.json();
        const btn = document.getElementById('mark-read-btn');
        const info = document.getElementById('read-info');
        btn.textContent = 'Read again';
        btn.classList.add('read');
        const mDays = calendarDaysAgo(data.lastRead);
        const mAgo = mDays === 0 ? 'today' : `${mDays} day${mDays !== 1 ? 's' : ''} ago`;
        info.textContent = 'Read ' + data.readCount + '× · Last: ' + fmtDate(data.lastRead) + ' (' + mAgo + ')';
        if (!vaultReads) vaultReads = {};
        vaultReads[docPath] = { readCount: data.readCount, lastRead: data.lastRead };
        applyReadDotsToNav();
        updateShowcaseCards();
      } catch {}
    }

    document.getElementById('mark-read-btn').addEventListener('click', markAsRead);

    async function init() {
      await checkAuthStatus();
      await loadVaultReads();
      navData = await loadNav();
      renderTree(navData, '');
      applyReadDotsToNav();
      updateShowcaseCards();
      await loadDocReadStatus();
      await loadQuizStatus();
    }

    function renderTree(data, query) {
      const container = document.getElementById('sidebar-tree');
      if (!data) { container.textContent = 'Navigation unavailable'; return; }
      const filtered = query ? filterTree(data, query.toLowerCase()) : data;
      container.innerHTML = '';
      if (filtered) container.appendChild(buildTree(filtered, 0, !!query));
    }

    document.getElementById('search-input').addEventListener('input', (e) => {
      renderTree(navData, e.target.value.trim());
    });

    // ── Lightbox ──
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');

    function openLightbox(src, alt) {
      lightboxImg.src = src;
      lightboxImg.alt = alt || '';
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
      lightbox.classList.remove('open');
      lightboxImg.src = '';
      document.body.style.overflow = '';
    }

    document.getElementById('content').addEventListener('click', e => {
      const img = e.target.closest('img');
      if (!img || img.closest('[data-doc-path]')) return;
      openLightbox(img.src, img.alt);
    });

    lightbox.addEventListener('click', e => {
      if (e.target !== lightboxImg) closeLightbox();
    });
    document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closeLightbox(); closeQuizModal(); }
    });

    // ── Quiz ──
    let quizSession = null;

    async function loadQuizStatus() {
      if (!currentUser) return;
      if (document.querySelector('[data-is-showcase]')) return;
      const docPath = CURRENT_PATH.replace(/^\//, '');
      try {
        const res = await fetch('/api/quiz/status?vault=' + encodeURIComponent(VAULT_NAME) + '&path=' + encodeURIComponent(docPath));
        if (!res.ok) return;
        const data = await res.json();
        document.getElementById('quiz-me-btn').style.display = '';
        document.getElementById('quiz-divider').style.display = '';
        if (data.lastRun) {
          const days = calendarDaysAgo(data.lastRun);
          const dAgo = days === 0 ? 'today' : `${days}d ago`;
          document.getElementById('quiz-info').textContent =
            'Quiz: ' + data.lastScore + '/' + data.lastTotal + ' · ' + dAgo;
        }
      } catch {}
    }

    function openQuizModal() {
      document.getElementById('quiz-modal').classList.add('open');
      document.body.style.overflow = 'hidden';
      showQuizLoading('Loading quizzes…');
      const docPath = CURRENT_PATH.replace(/^\//, '');
      fetch('/api/quiz/list?vault=' + encodeURIComponent(VAULT_NAME) + '&path=' + encodeURIComponent(docPath))
        .then(r => r.json())
        .then(data => {
          if (data.quizzes && data.quizzes.length > 0) showQuizSelect(data.quizzes);
          else startGeneratingQuiz();
        })
        .catch(() => showQuizError('Failed to load quizzes.'));
    }

    function closeQuizModal() {
      const modal = document.getElementById('quiz-modal');
      if (!modal.classList.contains('open')) return;
      modal.classList.remove('open');
      document.body.style.overflow = '';
      quizSession = null;
    }

    function quizScreen() { return document.getElementById('quiz-screen'); }

    function showQuizLoading(msg) {
      quizScreen().innerHTML = `<div class="quiz-loading"><div class="quiz-spinner"></div><p>${esc(msg)}</p></div>`;
    }

    function showQuizError(msg) {
      quizScreen().innerHTML =
        `<div class="quiz-error"><p>${esc(msg)}</p>` +
        `<div class="quiz-nav" style="justify-content:center;margin-top:16px">` +
        `<button class="quiz-next-btn" onclick="closeQuizModal()">Close</button></div></div>`;
    }

    function startGeneratingQuiz() {
      showQuizLoading('Generating quiz… this may take a moment.');
      const docPath = CURRENT_PATH.replace(/^\//, '');
      const articleText = document.getElementById('content').innerText;
      fetch('/api/quiz/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ vaultName: VAULT_NAME, docPath, articleText }),
      })
        .then(r => r.json())
        .then(quiz => {
          if (quiz.error) { showQuizError('Generation failed: ' + quiz.error); return; }
          startQuiz(quiz);
        })
        .catch(() => showQuizError('Failed to generate quiz.'));
    }

    function showQuizSelect(quizzes) {
      let html = '<div class="quiz-select"><h2>Select a Quiz</h2>';
      for (const q of quizzes) {
        const lastRunStr = q.lastRun
          ? `Last score: ${q.lastRun.score}/${q.lastRun.total} · ${fmtDate(q.lastRun.runAt)}`
          : 'Never run';
        html += `<div class="quiz-version-card">
          <div class="quiz-version-info">
            <span class="quiz-version-date">${fmtDate(q.generatedAt)}</span>
            <span class="quiz-version-count">${q.questionCount} questions</span>
            <span class="quiz-version-last">${esc(lastRunStr)}</span>
          </div>
          <button class="quiz-start-btn" data-quiz-id="${esc(q.id)}">Start →</button>
        </div>`;
      }
      html += '<button class="quiz-gen-btn" id="quiz-gen-new-btn">+ Generate New Quiz</button>';
      html += '</div>';
      quizScreen().innerHTML = html;
      quizScreen().querySelectorAll('.quiz-start-btn').forEach(btn => {
        btn.addEventListener('click', () => loadAndStartQuiz(btn.dataset.quizId));
      });
      document.getElementById('quiz-gen-new-btn').addEventListener('click', startGeneratingQuiz);
    }

    function loadAndStartQuiz(quizId) {
      showQuizLoading('Loading…');
      const docPath = CURRENT_PATH.replace(/^\//, '');
      fetch('/api/quiz?vault=' + encodeURIComponent(VAULT_NAME) +
            '&path=' + encodeURIComponent(docPath) +
            '&id=' + encodeURIComponent(quizId))
        .then(r => r.json())
        .then(quiz => startQuiz(quiz))
        .catch(() => showQuizError('Failed to load quiz.'));
    }

    function startQuiz(quiz) {
      quizSession = { quiz, answers: [], currentIdx: 0, quizId: quiz.id };
      renderQuestion();
    }

    function renderQuestion() {
      const { quiz, currentIdx } = quizSession;
      const q = quiz.questions[currentIdx];
      const total = quiz.questions.length;
      const isLast = currentIdx + 1 === total;
      let answersHtml = '';

      if (q.type === 'mc') {
        answersHtml = '<div class="quiz-answers">' +
          (q.answers || []).map(a =>
            `<button class="quiz-answer-btn" data-answer-id="${a.id}">${esc(a.answer)}</button>`
          ).join('') + '</div>';
      } else if (q.type === 'ms') {
        answersHtml = '<div class="quiz-answers quiz-answers-ms">' +
          (q.answers || []).map(a =>
            `<label class="quiz-answer-check"><input type="checkbox" data-answer-id="${a.id}"> ${esc(a.answer)}</label>`
          ).join('') + '</div>' +
          '<p class="quiz-ms-hint">Select all that apply.</p>';
      } else {
        answersHtml = '<p class="quiz-qa-hint">Think of your answer, then proceed.</p>';
      }

      quizScreen().innerHTML = `
        <div class="quiz-question-screen">
          <div class="quiz-progress-line">Question ${currentIdx + 1}  /  ${total}</div>
          <div class="quiz-question-text">${esc(q.question)}</div>
          ${answersHtml}
          <div class="quiz-nav">
            <button id="quiz-next-btn" class="quiz-next-btn"${q.type === 'mc' ? ' disabled' : ''}>
              ${isLast ? 'See Results' : 'Next →'}
            </button>
          </div>
        </div>`;

      if (q.type === 'mc') {
        quizScreen().querySelectorAll('.quiz-answer-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            quizScreen().querySelectorAll('.quiz-answer-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            document.getElementById('quiz-next-btn').disabled = false;
          });
        });
      }

      document.getElementById('quiz-next-btn').addEventListener('click', () => {
        let selectedId = null, selectedIds = null;
        if (q.type === 'mc') {
          const sel = quizScreen().querySelector('.quiz-answer-btn.selected');
          if (!sel) return;
          selectedId = parseInt(sel.dataset.answerId);
        } else if (q.type === 'ms') {
          selectedIds = Array.from(quizScreen().querySelectorAll('.quiz-answer-check input:checked'))
            .map(cb => parseInt(cb.dataset.answerId));
        }
        quizSession.pendingAnswer = { selectedId, selectedIds };
        renderFeedback();
      });
    }

    function scoreQuestion(q, { selectedId, selectedIds }) {
      if (q.type === 'mc') return selectedId === q.correctId;
      if (q.type === 'ms') {
        const correct = new Set(q.correctIds);
        const selected = new Set(selectedIds);
        return correct.size === selected.size && [...correct].every(id => selected.has(id));
      }
      return false;
    }

    function renderFeedback() {
      const { quiz, currentIdx, pendingAnswer } = quizSession;
      const q = quiz.questions[currentIdx];
      const total = quiz.questions.length;
      const isLast = currentIdx + 1 === total;

      if (q.type === 'qa') {
        quizScreen().innerHTML = `
          <div class="quiz-feedback-screen">
            <div class="quiz-progress-line">Question ${currentIdx + 1}  /  ${total}</div>
            <div class="quiz-question-text">${esc(q.question)}</div>
            <div class="quiz-model-answer"><strong>Model answer:</strong><br>${esc(q.answer)}</div>
            ${q.explanation ? `<div class="quiz-explanation">${esc(q.explanation)}</div>` : ''}
            <p class="quiz-self-grade-prompt">Did you get it right?</p>
            <div class="quiz-self-grade">
              <button class="quiz-grade-btn quiz-grade-correct" data-grade="1">I got it ✓</button>
              <button class="quiz-grade-btn quiz-grade-wrong" data-grade="0">I didn’t get it ✗</button>
            </div>
          </div>`;
        quizScreen().querySelectorAll('.quiz-grade-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            quizSession.answers.push({ questionId: q.id, isCorrect: btn.dataset.grade === '1' });
            advanceQuiz();
          });
        });
        return;
      }

      const isCorrect = scoreQuestion(q, pendingAnswer);
      quizSession.answers.push({ questionId: q.id, isCorrect });

      let correctDisplay = '';
      if (q.type === 'mc') {
        const ca = (q.answers || []).find(a => a.id === q.correctId);
        correctDisplay = ca ? esc(ca.answer) : '';
      } else if (q.type === 'ms') {
        correctDisplay = (q.answers || []).filter(a => (q.correctIds || []).includes(a.id))
          .map(a => esc(a.answer)).join(', ');
      }

      quizScreen().innerHTML = `
        <div class="quiz-feedback-screen">
          <div class="quiz-progress-line">Question ${currentIdx + 1}  /  ${total}</div>
          <div class="quiz-result-banner ${isCorrect ? 'correct' : 'incorrect'}">
            ${isCorrect ? '✓ Correct!' : '✗ Incorrect'}
          </div>
          <div class="quiz-question-text">${esc(q.question)}</div>
          <div class="quiz-correct-answer"><strong>Correct answer:</strong> ${correctDisplay}</div>
          ${q.explanation ? `<div class="quiz-explanation">${esc(q.explanation)}</div>` : ''}
          <div class="quiz-nav">
            <button id="quiz-next-btn" class="quiz-next-btn">${isLast ? 'See Results' : 'Next →'}</button>
          </div>
        </div>`;
      document.getElementById('quiz-next-btn').addEventListener('click', advanceQuiz);
    }

    function advanceQuiz() {
      quizSession.currentIdx++;
      quizSession.pendingAnswer = null;
      if (quizSession.currentIdx >= quizSession.quiz.questions.length) renderFinish();
      else renderQuestion();
    }

    function renderFinish() {
      const { quiz, answers, quizId } = quizSession;
      const score = answers.filter(a => a.isCorrect).length;
      const total = answers.length;

      let reviewHtml = '';
      for (let i = 0; i < quiz.questions.length; i++) {
        const q = quiz.questions[i];
        const a = answers[i];
        const ok = a && a.isCorrect;
        reviewHtml += `<div class="quiz-review-item ${ok ? 'correct' : 'incorrect'}">${ok ? '✓' : '✗'} Q${i+1}: ${esc(q.question)}</div>`;
      }

      quizScreen().innerHTML = `
        <div class="quiz-finish-screen">
          <h2>Quiz Complete!</h2>
          <div class="quiz-score">${score} / ${total}</div>
          <div class="quiz-review">${reviewHtml}</div>
          <div class="quiz-nav">
            <button id="quiz-save-close-btn" class="quiz-next-btn">Save &amp; Close</button>
          </div>
        </div>`;

      document.getElementById('quiz-save-close-btn').addEventListener('click', async () => {
        const docPath = CURRENT_PATH.replace(/^\//, '');
        try {
          await fetch('/api/quiz/run', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ vaultName: VAULT_NAME, docPath, quizId, score, total }),
          });
        } catch {}
        closeQuizModal();
        const days = 0;
        document.getElementById('quiz-info').textContent = 'Quiz: ' + score + '/' + total + ' · today';
      });
    }

    document.getElementById('quiz-me-btn').addEventListener('click', openQuizModal);
    document.getElementById('quiz-close-btn').addEventListener('click', closeQuizModal);
    document.getElementById('quiz-modal').addEventListener('click', e => {
      if (e.target === document.getElementById('quiz-modal')) closeQuizModal();
    });

    init();
  </script>
</body>
</html>
