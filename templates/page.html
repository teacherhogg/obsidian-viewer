<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} — {{VAULT_NAME}}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sidebar-width: 280px;
      --bg: #1e1e2e;
      --bg-sidebar: #181825;
      --bg-hover: #313244;
      --bg-active: #45475a;
      --text: #cdd6f4;
      --text-muted: #7f849c;
      --text-heading: #cba6f7;
      --accent: #89b4fa;
      --accent2: #a6e3a1;
      --border: #313244;
      --mark-bg: #f9e2af;
      --mark-text: #1e1e2e;
      --code-bg: #313244;
      --tag-bg: #313244;
      --tag-text: #89dceb;
      --blockquote-border: #cba6f7;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: var(--sidebar-width);
      min-width: var(--sidebar-width);
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 14px 16px;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #sidebar-search {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
    }

    #sidebar-search input {
      width: 100%;
      background: var(--bg-active);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.8rem;
      padding: 5px 8px;
      outline: none;
    }

    #sidebar-search input::placeholder { color: var(--text-muted); }

    #sidebar-tree {
      overflow-y: auto;
      flex: 1;
      padding: 6px 0;
    }

    /* ── Tree nodes ── */
    .tree-node { user-select: none; }

    .tree-item {
      display: flex;
      align-items: center;
      padding: 3px 8px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 0.83rem;
      gap: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
      text-decoration: none;
    }

    .tree-item:hover { background: var(--bg-hover); }
    .tree-item.active { background: var(--bg-active); color: var(--accent); }

    .tree-icon { font-size: 0.9em; flex-shrink: 0; }
    .tree-label { overflow: hidden; text-overflow: ellipsis; flex: 1; }

    .tree-toggle {
      width: 14px;
      flex-shrink: 0;
      text-align: center;
      font-size: 0.7em;
      color: var(--text-muted);
      transition: transform 0.15s;
    }

    .tree-children { display: none; }
    .tree-children.open { display: block; }

    /* ── Main content ── */
    #content-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 32px 48px;
      max-width: 860px;
    }

    /* ── Markdown styles ── */
    #content h1, #content h2, #content h3, #content h4 {
      color: var(--text-heading);
      margin: 1.5em 0 0.5em;
      line-height: 1.3;
    }
    #content h1 { font-size: 1.9rem; }
    #content h2 { font-size: 1.45rem; }
    #content h3 { font-size: 1.15rem; }

    #content p { line-height: 1.7; margin: 0.8em 0; }

    #content a { color: var(--accent); text-decoration: none; }
    #content a:hover { text-decoration: underline; }

    #content code {
      background: var(--code-bg);
      padding: 0.15em 0.4em;
      border-radius: 4px;
      font-size: 0.88em;
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    }

    #content pre {
      background: var(--code-bg);
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
      margin: 1em 0;
    }
    #content pre code { background: none; padding: 0; font-size: 0.85rem; }

    #content blockquote {
      border-left: 3px solid var(--blockquote-border);
      padding-left: 16px;
      color: var(--text-muted);
      margin: 1em 0;
      font-style: italic;
    }

    #content ul, #content ol { padding-left: 1.5em; margin: 0.8em 0; }
    #content li { margin: 0.3em 0; line-height: 1.6; }

    #content table { border-collapse: collapse; width: 100%; margin: 1em 0; }
    #content th, #content td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
    #content th { background: var(--bg-sidebar); color: var(--text-heading); }

    #content img { max-width: 100%; border-radius: 6px; margin: 0.5em 0; }

    #content hr { border: none; border-top: 1px solid var(--border); margin: 2em 0; }

    /* Obsidian extras */
    mark { background: var(--mark-bg); color: var(--mark-text); border-radius: 2px; padding: 0 2px; }

    .tag {
      background: var(--tag-bg);
      color: var(--tag-text);
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 0.78em;
      font-weight: 500;
    }

    .wikilink-unresolved {
      color: var(--text-muted);
      text-decoration: line-through;
      cursor: help;
    }

    .transclusion {
      border-left: 3px solid var(--accent2);
      background: var(--bg-sidebar);
      padding: 8px 12px;
      border-radius: 0 6px 6px 0;
      margin: 1em 0;
      font-style: normal;
    }
    .transclusion-note { font-size: 0.78em; color: var(--text-muted); }

    /* Task list checkboxes */
    #content input[type="checkbox"] { margin-right: 6px; accent-color: var(--accent); }

    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--bg-active); border-radius: 3px; }
  </style>
</head>
<body>
  <nav id="sidebar">
    <div id="sidebar-header">{{VAULT_NAME}}</div>
    <div id="sidebar-search"><input type="text" id="search-input" placeholder="Search files…" autocomplete="off"></div>
    <div id="sidebar-tree">Loading…</div>
  </nav>

  <div id="content-wrap">
    <article id="content">
      {{BODY}}
    </article>
  </div>

  <script>
    const ROOT_PREFIX = '{{ROOT_PREFIX}}';
    const CURRENT_PATH = location.pathname;

    async function loadNav() {
      try {
        const res = await fetch(ROOT_PREFIX + '_nav.json');
        if (!res.ok) throw new Error(res.status);
        return await res.json();
      } catch {
        return null;
      }
    }

    function buildTree(node, depth) {
      const div = document.createElement('div');
      div.className = 'tree-node';
      div.style.paddingLeft = (depth * 14) + 'px';

      if (node.type === 'dir' && depth > 0) {
        const item = document.createElement('div');
        item.className = 'tree-item dir-item';
        item.innerHTML = `<span class="tree-toggle">▶</span><span class="tree-icon">📁</span><span class="tree-label">${esc(node.name)}</span>`;

        const children = document.createElement('div');
        children.className = 'tree-children';

        if (node.children && node.children.length) {
          item.querySelector('.tree-toggle').addEventListener('click', (e) => {
            e.stopPropagation();
            const open = children.classList.toggle('open');
            item.querySelector('.tree-toggle').style.transform = open ? 'rotate(90deg)' : '';
          });
          for (const child of node.children) children.appendChild(buildTree(child, depth + 1));
        }

        div.appendChild(item);
        div.appendChild(children);

        // Auto-expand if current page is inside this dir
        if (CURRENT_PATH.includes('/' + node.path + '/') || CURRENT_PATH.includes('/' + node.path.replace(/\\/g, '/') + '/')) {
          children.classList.add('open');
          item.querySelector('.tree-toggle').style.transform = 'rotate(90deg)';
        }

      } else if (node.type === 'file') {
        const a = document.createElement('a');
        const href = ROOT_PREFIX + node.path;
        a.href = href;
        a.className = 'tree-item file-item';
        const icon = node.name.endsWith('.html') ? '📄' : '📎';
        const label = node.name.replace(/\.html$/, '');
        a.innerHTML = `<span class="tree-icon">${icon}</span><span class="tree-label">${esc(label)}</span>`;

        // Highlight active
        if (decodeURIComponent(location.pathname).endsWith('/' + node.path.replace(/\\/g, '/'))) {
          a.classList.add('active');
          // Ensure parents are open
          let parent = div.parentElement;
          while (parent) {
            const ch = parent.querySelector('.tree-children');
            const tog = parent.querySelector('.tree-toggle');
            if (ch) { ch.classList.add('open'); if (tog) tog.style.transform = 'rotate(90deg)'; }
            parent = parent.parentElement;
          }
        }

        div.appendChild(a);

      } else if (depth === 0 && node.type === 'dir') {
        // Root node: render children directly
        for (const child of (node.children || [])) div.appendChild(buildTree(child, depth + 1));
      }

      return div;
    }

    function esc(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function filterTree(node, query) {
      if (!query) return node;
      if (node.type === 'file') {
        return node.name.toLowerCase().includes(query) ? node : null;
      }
      const filteredChildren = (node.children || []).map(c => filterTree(c, query)).filter(Boolean);
      if (filteredChildren.length === 0) return null;
      return { ...node, children: filteredChildren };
    }

    let navData = null;

    async function init() {
      navData = await loadNav();
      renderTree(navData, '');
    }

    function renderTree(data, query) {
      const container = document.getElementById('sidebar-tree');
      if (!data) { container.textContent = 'Navigation unavailable'; return; }
      const filtered = query ? filterTree(data, query.toLowerCase()) : data;
      container.innerHTML = '';
      if (filtered) container.appendChild(buildTree(filtered, 0));
    }

    document.getElementById('search-input').addEventListener('input', (e) => {
      renderTree(navData, e.target.value.trim());
    });

    init();
  </script>
</body>
</html>
